<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ludo Mobile Edition</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="game-container">
    
    <div class="top-players">
      <div class="player-profile green-profile" id="p-green">
        <div class="profile-meta">Computer 2</div>
      </div>
      <div class="player-profile yellow-profile" id="p-yellow">
        <div class="profile-meta">Computer 3</div>
      </div>
    </div>

    <div class="board-wrapper">
      <div class="board" id="ludo-board">
        </div>
      <canvas id="gameBoard"></canvas>
    </div>

    <div class="bottom-players">
      <div class="player-profile red-profile" id="p-red">
        <div class="profile-meta">You</div>
        <button id="roll" class="dice-button">🎲</button>
      </div>
      <div class="player-profile blue-profile" id="p-blue">
        <div class="profile-meta">Computer 4</div>
      </div>
    </div>

  </div>

  <div id="game-form" class="form-container">
    <h2>LUDO SETUP</h2>
    
    <div class="setup-row">
      <label for="total-players"><b>Total Players:</b></label>
      <select id="total-players">
        <option value="2">2 Players</option>
        <option value="3">3 Players</option>
        <option value="4" selected>4 Players</option>
      </select>
    </div>

    <div class="players-inputs grid-2x2">
      <div class="p-input-box card-green">
        <span class="p-label">P1 (Green):</span>
        <input type="text" id="p1-name" value="Rehan" placeholder="Name">
      </div>
      <div class="p-input-box card-yellow">
        <span class="p-label">P2 (Yellow):</span>
        <input type="text" id="p2-name" value="RANDOM" placeholder="Name">
      </div>
      <div class="p-input-box card-red">
        <span class="p-label">P3 (Red):</span>
        <input type="text" id="p3-name" value="RANDOMb" placeholder="Name">
      </div>
      <div class="p-input-box card-blue">
        <span class="p-label">P4 (Blue):</span>
        <input type="text" id="p4-name" value="HALb" placeholder="Name">
      </div>
    </div>

    <button id="start-game-btn" class="submit-btn">Start Game!</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
