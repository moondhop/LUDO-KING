<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ludo Pro</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div id="loading">

<div class="logo">
LUDO <span>PRO</span>
</div>

<div class="loader"></div>

</div>

<div id="menu" class="hide">

<h1>LUDO PRO</h1>

<button id="passplay">
🎮 Pass & Play
</button>

<button id="computer">
🤖 Play With Computer
</button>

<button id="settings">
⚙ Settings
</button>

<button id="exit">
❌ Exit
</button>

</div>

<div id="game" class="hide">

<div id="top">

<div id="turn">
RED TURN
</div>

<div id="dice">
🎲
</div>

<button id="roll">
ROLL
</button>

</div>

<canvas id="board" width="720" height="720"></canvas>

</div>

<script src="js/game.js"></script>

</body>
</html>
