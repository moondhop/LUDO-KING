<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ludo Pro Mobile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="game-container">
    <div class="top-players">
      <div class="player-profile green-profile" id="p-green">
        <div class="profile-meta">Green (P1)</div>
      </div>
      <div class="player-profile yellow-profile" id="p-yellow">
        <div class="profile-meta">Yellow (P2)</div>
      </div>
    </div>

    <div class="board-wrapper">
      <div class="ludo-grid-bg" id="ludoBg"></div>
      <canvas id="gameBoard"></canvas>
    </div>

    <div class="bottom-players">
      <div class="player-profile red-profile" id="p-red">
        <div class="profile-meta">Red (P3)</div>
        <div id="dice-container" class="dice-box">
          <span id="dice-face">🎲</span>
        </div>
      </div>
      <div class="player-profile blue-profile" id="p-blue">
        <div class="profile-meta">Blue (P4)</div>
      </div>
    </div>
  </div>

  <div id="game-form" class="form-container">
    <h2>LUDO SYSTEM</h2>
    
    <div class="setup-row">
      <label for="total-players"><b>Mode Select:</b></label>
      <select id="total-players">
        <option value="2_FACE">2 Players (Aamne-Samne: Red vs Green)</option>
        <option value="4" selected>4 Players (Classic All)</option>
      </select>
    </div>

    <div class="players-inputs grid-2x2">
      <div class="p-input-box card-green">
        <span>P1 (Green):</span>
        <input type="text" id="p1-name" value="Computer 2">
      </div>
      <div class="p-input-box card-yellow">
        <span>P2 (Yellow):</span>
        <input type="text" id="p2-name" value="Computer 3">
      </div>
      <div class="p-input-box card-red">
        <span>P3 (Red - YOU):</span>
        <input type="text" id="p3-name" value="Rehan">
      </div>
      <div class="p-input-box card-blue">
        <span>P4 (Blue):</span>
        <input type="text" id="p4-name" value="HALb">
      </div>
    </div>

    <button id="start-game-btn" class="submit-btn">Start Game!</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
